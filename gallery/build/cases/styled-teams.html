    if (!payloadNode) {

    }

    let maxX = -Infinity;
    let minY = Infinity;
    let maxY = -Infinity;
    for (const node of nodes) {

      const y = Number(node.y) || 0;

      maxX = Math.max(maxX, x);

      maxY = Math.max(maxY, y);

      maxX += 1;

    let panX = 0;
    let panY = 0;
    let dragStart = null;

      const spanX = baseBounds.maxX - baseBounds.minX;
      const spanY = baseBounds.maxY - baseBounds.minY;
