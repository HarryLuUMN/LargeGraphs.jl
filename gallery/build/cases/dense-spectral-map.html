<script>

  function parsePayload(root) {

    if (!payloadNode) {

    }
    try {

    let minY = Infinity;
    let maxY = -Infinity;

    canvas.width = width;
    canvas.height = height;
    canvas.style.width = "100%";
    canvas.style.height = "100%";

    hint.textContent = "Offline mode";
